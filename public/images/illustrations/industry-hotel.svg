<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid slice">
  <title>Khách sạn, homestay và villa</title>
  <desc>Minh hoạ villa nghỉ dưỡng với hồ bơi, cây dừa và thẻ đặt phòng trực tiếp</desc>
  <rect width="400" height="200" fill="#eff6ff"/>
  <circle cx="330" cy="40" r="120" fill="#dbeafe"/>
  <!-- sun -->
  <circle cx="320" cy="48" r="26" fill="#93c5fd"/>
  <!-- ground -->
  <rect x="0" y="150" width="400" height="50" fill="#bfdbfe" opacity="0.6"/>
  <!-- pool -->
  <rect x="30" y="158" width="150" height="30" rx="10" fill="#60a5fa"/>
  <path d="M44 168h120M44 178h120" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <!-- villa -->
  <g transform="translate(196 70)">
    <rect x="0" y="34" width="150" height="86" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <path d="M-12 36L75 -2 162 36z" fill="#2563eb"/>
    <path d="M-12 36L75 -2 162 36z" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linejoin="round"/>
    <!-- door -->
    <rect x="60" y="78" width="30" height="42" rx="4" fill="#3b82f6"/>
    <!-- windows -->
    <rect x="16" y="54" width="28" height="26" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <rect x="106" y="54" width="28" height="26" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <line x1="30" y1="54" x2="30" y2="80" stroke="#93c5fd" stroke-width="1.5"/>
    <line x1="120" y1="54" x2="120" y2="80" stroke="#93c5fd" stroke-width="1.5"/>
  </g>
  <!-- palm tree -->
  <g transform="translate(360 150)">
    <path d="M-3 0c-2-24 0-44 2-52" stroke="#1d4ed8" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M0-52c14-6 26-2 32 8-12-4-22-2-32 4z" fill="#3b82f6"/>
    <path d="M0-52c-14-6-26-2-32 8 12-4 22-2 32 4z" fill="#2563eb"/>
    <path d="M0-52c6-14 18-20 30-18-10 6-18 14-22 24z" fill="#60a5fa"/>
  </g>
  <!-- floating booking card -->
  <g transform="translate(20 28)">
    <rect x="0" y="0" width="116" height="56" rx="12" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
    <rect x="12" y="12" width="58" height="6" rx="3" fill="#1d4ed8"/>
    <rect x="12" y="24" width="92" height="4" rx="2" fill="#bfdbfe"/>
    <rect x="12" y="38" width="50" height="10" rx="5" fill="#2563eb"/>
    <path d="M80 36h24v12H80z" fill="#eff6ff"/>
    <text x="92" y="46" font-family="monospace" font-size="9" font-weight="700" fill="#2563eb" text-anchor="middle">-OTA</text>
  </g>
</svg>
