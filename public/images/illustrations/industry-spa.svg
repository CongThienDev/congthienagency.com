<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid slice">
  <title>Spa, massage và wellness</title>
  <desc>Minh hoạ spa với hoa sen, đá zen, nến thơm và thẻ đặt liệu trình</desc>
  <rect width="400" height="200" fill="#ecfeff"/>
  <circle cx="320" cy="40" r="120" fill="#cffafe"/>
  <circle cx="60" cy="180" r="90" fill="#e0f2fe"/>
  <!-- towel / table surface -->
  <ellipse cx="200" cy="172" rx="150" ry="20" fill="#a5f3fc" opacity="0.6"/>
  <!-- zen stones -->
  <ellipse cx="120" cy="158" rx="34" ry="12" fill="#0e7490"/>
  <ellipse cx="120" cy="143" rx="27" ry="10" fill="#155e75"/>
  <ellipse cx="120" cy="131" rx="20" ry="8" fill="#164e63"/>
  <!-- candle -->
  <rect x="252" y="130" width="34" height="34" rx="6" fill="#ffffff" stroke="#22d3ee" stroke-width="2"/>
  <path d="M269 118c8 6 8 16 0 18-7-3-7-12 0-18z" fill="#fbbf24"/>
  <path d="M269 124c4 3 4 8 0 9-4-2-4-7 0-9z" fill="#fde68a"/>
  <!-- lotus flower -->
  <g transform="translate(200 96)">
    <path d="M0 18C-10 6-10-12 0-26 10-12 10 6 0 18z" fill="#38bdf8"/>
    <path d="M0 18C-22 14-32 0-32-16-14-12 0 0 0 18z" fill="#22d3ee"/>
    <path d="M0 18C22 14 32 0 32-16 14-12 0 0 0 18z" fill="#22d3ee"/>
    <path d="M0 20C-40 22-58 12-62-2-40-4-14 6 0 20z" fill="#67e8f9"/>
    <path d="M0 20C40 22 58 12 62-2 40-4 14 6 0 20z" fill="#67e8f9"/>
    <ellipse cx="0" cy="20" rx="14" ry="6" fill="#0891b2"/>
  </g>
  <!-- floating booking chip -->
  <g transform="translate(286 44)">
    <rect x="-2" y="-2" width="96" height="40" rx="12" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="11" fill="#06b6d4"/>
    <path d="M13 18l3.5 3.5L24 14" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="36" y="11" width="48" height="5" rx="2.5" fill="#155e75"/>
    <rect x="36" y="21" width="34" height="4" rx="2" fill="#a5f3fc"/>
  </g>
  <!-- sparkles -->
  <path d="M96 64l3 7 7 3-7 3-3 7-3-7-7-3 7-3z" fill="#22d3ee"/>
  <path d="M330 150l2 5 5 2-5 2-2 5-2-5-5-2 5-2z" fill="#67e8f9"/>
</svg>
