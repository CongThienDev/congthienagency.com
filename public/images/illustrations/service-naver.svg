<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid slice">
  <title>Naver Marketing — blog review &amp; KOC Hàn Quốc</title>
  <desc>Minh hoạ bài blog review trên Naver với logo N, đánh giá sao và hợp tác KOC</desc>
  <defs>
    <linearGradient id="nv-cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05c95b"/>
      <stop offset="1" stop-color="#03a94d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#ecfdf5"/>
  <circle cx="60" cy="40" r="90" fill="#d1fae5"/>
  <circle cx="360" cy="180" r="80" fill="#a7f3d0" opacity="0.5"/>

  <!-- blog review card -->
  <g>
    <ellipse cx="190" cy="178" rx="150" ry="16" fill="#0b3d24" opacity="0.10"/>
    <rect x="64" y="32" width="252" height="142" rx="16" fill="#ffffff"/>
    <!-- cover -->
    <rect x="64" y="32" width="252" height="58" rx="16" fill="url(#nv-cover)"/>
    <rect x="64" y="74" width="252" height="16" fill="url(#nv-cover)"/>
    <circle cx="290" cy="52" r="34" fill="#ffffff" opacity="0.12"/>
    <!-- N badge -->
    <rect x="80" y="46" width="30" height="30" rx="7" fill="#ffffff"/>
    <path d="M88 70V52h5l8 11V52h5v18h-5l-8-11v11z" fill="#03c75a"/>
    <rect x="118" y="52" width="78" height="7" rx="3.5" fill="#ffffff"/>
    <rect x="118" y="64" width="54" height="5" rx="2.5" fill="#d1fae5"/>
    <!-- reviewer row -->
    <circle cx="84" cy="112" r="11" fill="#dcfce7"/>
    <path d="M84 112a4 4 0 100-8 4 4 0 000 8zm-7 8c0-4 3-6 7-6s7 2 7 6z" fill="#10b981"/>
    <rect x="102" y="103" width="60" height="6" rx="3" fill="#334155"/>
    <g transform="translate(102 116)" fill="#fbbf24">
      <path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/>
      <g transform="translate(11 0)"><path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/></g>
      <g transform="translate(22 0)"><path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/></g>
      <g transform="translate(33 0)"><path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/></g>
      <g transform="translate(44 0)"><path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/></g>
    </g>
    <!-- body lines -->
    <rect x="84" y="134" width="216" height="5" rx="2.5" fill="#e2e8f0"/>
    <rect x="84" y="145" width="200" height="5" rx="2.5" fill="#eef2f7"/>
    <rect x="84" y="156" width="150" height="5" rx="2.5" fill="#eef2f7"/>
  </g>

  <!-- floating KOC badge -->
  <g transform="translate(258 120)">
    <rect x="0" y="0" width="74" height="40" rx="12" fill="#ffffff"/>
    <rect x="0" y="0" width="74" height="40" rx="12" fill="#03c75a" opacity="0.06"/>
    <circle cx="20" cy="20" r="11" fill="#03c75a"/>
    <path d="M16 20l3 3 6-6" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="36" y="17" font-family="sans-serif" font-size="9" font-weight="700" fill="#065f46">KOC</text>
    <text x="36" y="29" font-family="sans-serif" font-size="6.5" fill="#10b981">방문후기</text>
  </g>
</svg>
