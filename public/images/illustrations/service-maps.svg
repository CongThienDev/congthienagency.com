<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid slice">
  <title>Google Maps Review &amp; Reputation</title>
  <desc>Minh hoạ hồ sơ Google Maps với bản đồ, ghim địa điểm, đánh giá thật và uy tín địa phương</desc>
  <defs>
    <linearGradient id="mp-pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ea4335"/>
      <stop offset="1" stop-color="#c5221f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#eef2f7"/>
  <circle cx="350" cy="36" r="80" fill="#e2e8f0"/>

  <!-- map card -->
  <g>
    <ellipse cx="150" cy="180" rx="120" ry="14" fill="#0f172a" opacity="0.08"/>
    <rect x="40" y="34" width="220" height="132" rx="16" fill="#ffffff"/>
    <clipPath id="mpclip"><rect x="48" y="42" width="204" height="116" rx="10"/></clipPath>
    <g clip-path="url(#mpclip)">
      <rect x="48" y="42" width="204" height="116" fill="#e8eef0"/>
      <!-- water -->
      <path d="M48 120c40-10 70 6 110-2 36-8 60 2 94 4v36H48z" fill="#a9d3f0"/>
      <!-- parks -->
      <circle cx="90" cy="70" r="26" fill="#cdeac0"/>
      <circle cx="210" cy="118" r="22" fill="#cdeac0"/>
      <!-- roads -->
      <path d="M48 92h204M150 42v116M70 60l60 60" stroke="#ffffff" stroke-width="6" fill="none"/>
      <path d="M48 92h204M150 42v116" stroke="#fbbc04" stroke-width="2.5" fill="none" opacity="0.8"/>
    </g>
    <!-- glowing pin -->
    <circle cx="150" cy="92" r="26" fill="#ea4335" opacity="0.16"/>
    <g transform="translate(150 92)">
      <path d="M0-24c12 0 19 9 19 19 0 12-19 27-19 27S-19 7-19-5c0-10 7-19 19-19z" fill="url(#mp-pin)"/>
      <circle cx="0" cy="-5" r="8" fill="#fff"/>
      <path d="M-3-5a3 3 0 106 0 3 3 0 00-6 0z" fill="#ea4335"/>
    </g>
  </g>

  <!-- review card -->
  <g transform="translate(232 56)">
    <ellipse cx="62" cy="96" rx="64" ry="10" fill="#0f172a" opacity="0.08"/>
    <rect x="0" y="0" width="128" height="88" rx="14" fill="#ffffff"/>
    <!-- google G -->
    <g transform="translate(14 14)">
      <path d="M18 9.2h-8.5v3.4h4.9c-.5 2.3-2.5 3.4-4.9 3.4A5 5 0 119 7c1.3 0 2.4.5 3.3 1.3l2.5-2.5A8.5 8.5 0 109 17.5c4.9 0 8.2-3.4 8.2-8.3 0-.6 0-1-.2-2z" fill="#4285f4"/>
    </g>
    <rect x="42" y="14" width="60" height="6" rx="3" fill="#334155"/>
    <rect x="42" y="24" width="40" height="5" rx="2.5" fill="#cbd5e1"/>
    <!-- big rating -->
    <text x="14" y="58" font-family="sans-serif" font-size="20" font-weight="700" fill="#0f172a">4.9</text>
    <g transform="translate(52 50)" fill="#fbbc04">
      <path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/>
      <g transform="translate(11 0)"><path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/></g>
      <g transform="translate(22 0)"><path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/></g>
      <g transform="translate(33 0)"><path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/></g>
      <g transform="translate(44 0)"><path d="M0-5l1.4 2.9 3.2.5-2.3 2.2.5 3.1L0 1.7-2.8 3.2l.5-3.1L-4.6-1.6l3.2-.5z"/></g>
    </g>
    <rect x="14" y="68" width="100" height="5" rx="2.5" fill="#e2e8f0"/>
    <rect x="14" y="77" width="74" height="5" rx="2.5" fill="#eef2f7"/>
  </g>
</svg>
