<svg viewBox="0 0 440 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Thiết kế website SEO có booking &amp; thanh toán</title>
  <desc>Minh hoạ website với điểm PageSpeed 100, luồng booking và thanh toán online</desc>
  <defs>
    <linearGradient id="sw-hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="sw-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- soft shadow -->
  <ellipse cx="230" cy="320" rx="170" ry="22" fill="#0b1220" opacity="0.45"/>

  <!-- ===== main browser window ===== -->
  <g>
    <rect x="46" y="46" width="300" height="232" rx="16" fill="#ffffff"/>
    <rect x="46" y="46" width="300" height="26" rx="16" fill="#f1f5f9"/>
    <rect x="46" y="60" width="300" height="12" fill="#f1f5f9"/>
    <circle cx="62" cy="59" r="3.5" fill="#cbd5e1"/>
    <circle cx="74" cy="59" r="3.5" fill="#cbd5e1"/>
    <circle cx="86" cy="59" r="3.5" fill="#cbd5e1"/>
    <rect x="150" y="52.5" width="120" height="13" rx="6.5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- page: hero -->
    <rect x="46" y="72" width="300" height="120" fill="url(#sw-hero)"/>
    <circle cx="320" cy="92" r="60" fill="#3b82f6" opacity="0.4"/>
    <circle cx="70" cy="60" r="6" fill="#bfdbfe"/>
    <rect x="84" y="94" width="36" height="6" rx="3" fill="#dbeafe"/>
    <rect x="230" y="95" width="22" height="4" rx="2" fill="#bfdbfe"/>
    <rect x="258" y="95" width="22" height="4" rx="2" fill="#bfdbfe"/>
    <rect x="286" y="91" width="44" height="12" rx="6" fill="#ffffff"/>
    <rect x="298" y="95" width="20" height="4" rx="2" fill="#2563eb"/>
    <rect x="64" y="120" width="150" height="11" rx="4" fill="#ffffff"/>
    <rect x="64" y="138" width="118" height="11" rx="4" fill="#dbeafe" opacity="0.85"/>
    <rect x="64" y="162" width="80" height="16" rx="8" fill="#fbbf24"/>
    <!-- booking widget overlapping -->
    <g>
      <rect x="64" y="198" width="264" height="34" rx="9" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="74" y="208" width="58" height="14" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
      <rect x="140" y="208" width="58" height="14" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
      <rect x="206" y="208" width="58" height="14" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
      <rect x="272" y="206" width="48" height="18" rx="9" fill="#2563eb"/>
    </g>
    <!-- body lines -->
    <rect x="64" y="244" width="120" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="64" y="256" width="170" height="6" rx="3" fill="#eef2f7"/>
  </g>

  <!-- ===== floating PageSpeed gauge ===== -->
  <g transform="translate(360 92)">
    <circle r="40" fill="#ffffff"/>
    <circle r="40" fill="#0b1220" opacity="0.06"/>
    <circle r="30" fill="none" stroke="#e2e8f0" stroke-width="6"/>
    <circle r="30" fill="none" stroke="url(#sw-ring)" stroke-width="6" stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="0" transform="rotate(-90)"/>
    <text x="0" y="2" font-family="sans-serif" font-size="20" font-weight="700" fill="#0f172a" text-anchor="middle">100</text>
    <text x="0" y="15" font-family="sans-serif" font-size="6.5" letter-spacing="0.5" fill="#10b981" text-anchor="middle">SEO SCORE</text>
  </g>

  <!-- ===== floating payment card ===== -->
  <g transform="translate(28 250)">
    <rect x="0" y="0" width="120" height="74" rx="12" fill="#ffffff"/>
    <rect x="0" y="0" width="120" height="74" rx="12" fill="#0b1220" opacity="0.05"/>
    <rect x="12" y="12" width="96" height="30" rx="6" fill="#2563eb"/>
    <rect x="12" y="12" width="96" height="30" rx="6" fill="url(#sw-hero)"/>
    <rect x="20" y="20" width="14" height="10" rx="2" fill="#fcd34d"/>
    <rect x="20" y="34" width="60" height="3" rx="1.5" fill="#bfdbfe"/>
    <circle cx="92" cy="34" r="6" fill="#fbbf24" opacity="0.9"/>
    <circle cx="100" cy="34" r="6" fill="#f87171" opacity="0.9"/>
    <g transform="translate(12 50)">
      <circle cx="7" cy="7" r="7" fill="#dcfce7"/>
      <path d="M3.5 7l2.5 2.5L11 4" stroke="#16a34a" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="20" y="2" width="60" height="4" rx="2" fill="#334155"/>
      <rect x="20" y="9" width="40" height="3" rx="1.5" fill="#cbd5e1"/>
    </g>
  </g>

  <!-- ===== floating confirm chip ===== -->
  <g transform="translate(300 248)">
    <rect x="0" y="0" width="116" height="30" rx="15" fill="#ffffff"/>
    <rect x="0" y="0" width="116" height="30" rx="15" fill="#0b1220" opacity="0.05"/>
    <circle cx="17" cy="15" r="9" fill="#2563eb"/>
    <path d="M12.5 15l3 3 6-6.5" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="32" y="9" width="60" height="5" rx="2.5" fill="#334155"/>
    <rect x="32" y="18" width="44" height="4" rx="2" fill="#cbd5e1"/>
  </g>
</svg>
