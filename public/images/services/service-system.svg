<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .center-circle { fill: #2563eb; }
      .center-text { font-size: 18px; font-weight: bold; fill: white; text-anchor: middle; }
      .service-box { fill: #f3f4f6; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .service-title { font-size: 16px; font-weight: 600; fill: #1f2937; text-anchor: middle; }
      .service-desc { font-size: 12px; fill: #6b7280; text-anchor: middle; }
      .connection { stroke: #2563eb; stroke-width: 2; stroke-dasharray: 5,5; fill: none; }
      .badge { fill: #dbeafe; }
      .badge-text { font-size: 11px; fill: #1e40af; font-weight: 600; text-anchor: middle; }
    </style>
  </defs>

  <!-- Center Hub -->
  <circle cx="600" cy="350" r="80" class="center-circle"/>
  <text x="600" y="350" class="center-text" dominant-baseline="middle">Website</text>
  <text x="600" y="375" class="center-text" dominant-baseline="middle" style="font-size: 14px;">Nền tảng</text>

  <!-- Website Box (Top) -->
  <line x1="600" y1="270" x2="600" y2="150" class="connection"/>
  <rect x="480" y="50" width="240" height="100" class="service-box"/>
  <text x="600" y="85" class="service-title">Thiết kế Website SEO</text>
  <text x="600" y="105" class="service-desc">Booking + Thanh toán</text>
  <text x="600" y="120" class="service-desc">PageSpeed 100/100</text>
  <rect x="515" y="130" width="170" height="20" class="badge"/>
  <text x="600" y="144" class="badge-text">Website • SEO • Booking</text>

  <!-- Naver Marketing Box (Left) -->
  <line x1="520" y1="350" x2="320" y2="350" class="connection"/>
  <rect x="100" y="280" width="220" height="140" class="service-box"/>
  <text x="210" y="315" class="service-title">Naver Marketing</text>
  <text x="210" y="335" class="service-desc">Blog review Hàn Quốc</text>
  <text x="210" y="350" class="service-desc">KOC collaboration</text>
  <text x="210" y="365" class="service-desc">Naver Search ranking</text>
  <rect x="140" y="385" width="140" height="20" class="badge"/>
  <text x="210" y="399" class="badge-text">Naver • KOC • SEO</text>

  <!-- Google Maps Box (Right) -->
  <line x1="680" y1="350" x2="880" y2="350" class="connection"/>
  <rect x="880" y="280" width="220" height="140" class="service-box"/>
  <text x="990" y="315" class="service-title">Google Maps Review</text>
  <text x="990" y="335" class="service-desc">Tối ưu hồ sơ Maps</text>
  <text x="990" y="350" class="service-desc">Quản lý đánh giá</text>
  <text x="990" y="365" class="service-desc">Local reputation</text>
  <rect x="920" y="385" width="140" height="20" class="badge"/>
  <text x="990" y="399" class="badge-text">Maps • Review • Local</text>

  <!-- Social Marketing Box (Bottom) -->
  <line x1="600" y1="430" x2="600" y2="570" class="connection"/>
  <rect x="480" y="570" width="240" height="100" class="service-box"/>
  <text x="600" y="605" class="service-title">Social Marketing</text>
  <text x="600" y="625" class="service-desc">Fanpage verification</text>
  <text x="600" y="640" class="service-desc">Meta Verified</text>
  <rect x="515" y="650" width="170" height="20" class="badge"/>
  <text x="600" y="664" class="badge-text">Facebook • Social • Growth</text>

  <!-- Center label -->
  <text x="600" y="20" style="font-size: 14px; fill: #6b7280; text-anchor: middle; font-weight: 500;">Bốn mảng dịch vụ, một hệ thống marketing</text>
</svg>