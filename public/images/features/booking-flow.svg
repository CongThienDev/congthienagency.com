<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .flow-box { fill: #f3f4f6; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .flow-title { font-size: 16px; font-weight: 600; fill: #1f2937; text-anchor: middle; }
      .flow-desc { font-size: 12px; fill: #6b7280; text-anchor: middle; }
      .arrow-line { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .success-box { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .success-text { fill: #166534; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Step 1: Khách chọn dịch vụ -->
  <rect x="50" y="150" width="180" height="100" class="flow-box"/>
  <text x="140" y="185" class="flow-title">1. Chọn Dịch Vụ</text>
  <text x="140" y="205" class="flow-desc">Khách xem danh sách</text>
  <text x="140" y="220" class="flow-desc">treatment/service</text>

  <!-- Arrow 1 -->
  <path d="M 230 200 L 310 200" class="arrow-line"/>

  <!-- Step 2: Chọn ngày & giờ -->
  <rect x="310" y="150" width="180" height="100" class="flow-box"/>
  <text x="400" y="185" class="flow-title">2. Chọn Ngày & Giờ</text>
  <text x="400" y="205" class="flow-desc">Lịch trình khả dụng</text>
  <text x="400" y="220" class="flow-desc">theo từng dịch vụ</text>

  <!-- Arrow 2 -->
  <path d="M 490 200 L 570 200" class="arrow-line"/>

  <!-- Step 3: Nhập thông tin khách -->
  <rect x="570" y="150" width="180" height="100" class="flow-box"/>
  <text x="660" y="185" class="flow-title">3. Thông Tin Khách</text>
  <text x="660" y="205" class="flow-desc">Tên, email, điện thoại</text>
  <text x="660" y="220" class="flow-desc">yêu cầu đặc biệt</text>

  <!-- Arrow 3 -->
  <path d="M 750 200 L 830 200" class="arrow-line"/>

  <!-- Step 4: Thanh toán -->
  <rect x="830" y="150" width="180" height="100" class="flow-box"/>
  <text x="920" y="185" class="flow-title">4. Thanh Toán</text>
  <text x="920" y="205" class="flow-desc">PayPal / Stripe /</text>
  <text x="920" y="220" class="flow-desc">Credit Card</text>

  <!-- Arrow 4 -->
  <path d="M 1010 200 L 1070 200" class="arrow-line"/>

  <!-- Step 5: Thành công -->
  <rect x="1070" y="150" width="100" height="100" class="success-box"/>
  <text x="1120" y="190" class="flow-title success-text">✓ Thành</text>
  <text x="1120" y="210" class="flow-title success-text">Công</text>

  <!-- Automatic email confirmation note -->
  <rect x="50" y="310" width="1120" height="80" fill="none" stroke="#d1d5db" stroke-width="1" stroke-dasharray="5,5" rx="8"/>
  <text x="80" y="335" style="font-size: 13px; font-weight: 600; fill: #1f2937;">Email xác nhận tự động</text>
  <text x="80" y="355" style="font-size: 12px; fill: #6b7280;">Sau khi thanh toán thành công, khách nhận email xác nhận đặt dịch vụ kèm chi tiết: ngày giờ, dịch vụ,</text>
  <text x="80" y="375" style="font-size: 12px; fill: #6b7280;">giá tiền và hướng dẫn đến địa điểm. Admin cũng nhận thông báo để chuẩn bị.</text>

  <!-- Bottom title -->
  <text x="600" y="450" style="font-size: 14px; fill: #374151; text-anchor: middle; font-weight: 500;">Luồng booking & thanh toán online hoàn chỉnh</text>
</svg>